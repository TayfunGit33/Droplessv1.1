<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>How to Use — Dropless</title>
<meta name="description" content="Step-by-step instructions for your Dropless hydrophobic coating product. Available in 8 languages."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f4f1ec;--bg2:#eae5dc;--ink:#0d2027;--soft:#2c3e44;--muted:#6d7a7e;--line:#d8d2c6;--teal:#1a5d6e;--teal2:#4ea8b0;--white:#fefdfb;--max:760px;--pad:clamp(16px,4vw,32px);}
*,*::before,*::after{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Geist',system-ui,sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}
body.rtl{direction:rtl;text-align:right;}
a{color:var(--teal);text-decoration:none;}
a:hover{text-decoration:underline;}

/* TOP BAR */
.topbar{background:var(--ink);color:rgba(255,255,255,.75);padding:12px var(--pad);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.topbar-brand{font-family:'Fraunces',serif;font-size:18px;color:#fff;display:flex;align-items:center;gap:7px;}
.logo-drop{width:10px;height:14px;background:var(--teal2);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;}
.topbar-back{font-size:13px;opacity:.7;transition:opacity .2s;}
.topbar-back:hover{opacity:1;text-decoration:none;}

/* LANG SELECTOR */
.lang-bar{background:var(--bg2);border-bottom:1px solid var(--line);padding:10px var(--pad);display:flex;align-items:center;gap:8px;flex-wrap:wrap;overflow-x:auto;}
.lang-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-family:'Geist',sans-serif;cursor:pointer;color:var(--soft);transition:.2s;white-space:nowrap;}
.lang-btn:hover{border-color:var(--teal);color:var(--teal);}
.lang-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.lang-bar-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-right:4px;white-space:nowrap;}

/* PRODUCT SELECTOR (no ?product param) */
.sel-wrap{max-width:var(--max);margin:0 auto;padding:40px var(--pad);}
.sel-wrap h1{font-family:'Fraunces',serif;font-size:clamp(26px,5vw,40px);margin:0 0 8px;}
.sel-wrap p{color:var(--soft);margin:0 0 32px;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.prod-tile{background:var(--white);border:1.5px solid var(--line);border-radius:10px;padding:18px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px;}
.prod-tile:hover{border-color:var(--teal);box-shadow:0 4px 16px rgba(26,93,110,.1);transform:translateY(-1px);}
.pt-icon{font-size:26px;flex-shrink:0;}
.pt-name{font-family:'Fraunces',serif;font-size:15px;line-height:1.25;}

/* PRODUCT INSTRUCTIONS */
.inst-wrap{max-width:var(--max);margin:0 auto;padding:32px var(--pad) 60px;}
.prod-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--line);}
.prod-header-icon{font-size:48px;flex-shrink:0;}
.prod-header-text{}
.prod-header-name{font-family:'Fraunces',serif;font-size:clamp(22px,4vw,34px);margin:0 0 4px;line-height:1.15;}
.prod-header-surfaces{font-size:13px;color:var(--teal);font-weight:500;letter-spacing:.04em;}
.prod-header-sub{font-size:13px;color:var(--muted);margin-top:4px;}

/* CARDS */
.card{background:var(--white);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.card-head{padding:14px 20px;display:flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;}
.card-head .ch-ico{font-size:18px;}
.card-body{padding:0 20px 20px;}

.eff-box{background:rgba(78,168,176,.08);border-left:3px solid var(--teal2);padding:12px 16px;border-radius:0 6px 6px 0;font-size:14px;color:var(--soft);line-height:1.6;margin-bottom:0;}
body.rtl .eff-box{border-left:none;border-right:3px solid var(--teal2);}

.steps-list{margin:0;padding-left:0;list-style:none;counter-reset:steps;}
.steps-list li{counter-increment:steps;display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--bg2);font-size:14.5px;}
.steps-list li:last-child{border-bottom:none;}
.steps-list li::before{content:counter(steps);min-width:26px;height:26px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;font-family:'Geist',sans-serif;}
body.rtl .steps-list{padding-right:0;}

/* TIPS BOX */
.tips-box{background:rgba(255,230,100,.18);border:1px solid rgba(200,170,0,.3);border-radius:8px;padding:14px 18px;font-size:13.5px;color:#6b5500;display:flex;gap:10px;align-items:flex-start;}
.tips-box .tips-ico{flex-shrink:0;font-size:18px;}

/* BUY AGAIN */
.buy-again{background:var(--teal);color:#fff;border-radius:10px;padding:24px;text-align:center;margin-top:24px;}
.buy-again h3{font-family:'Fraunces',serif;font-size:20px;margin:0 0 6px;color:#fff;}
.buy-again p{font-size:13.5px;opacity:.85;margin:0 0 16px;}
.buy-again a{display:inline-block;background:#fff;color:var(--teal);font-family:'Geist',sans-serif;font-size:14px;font-weight:600;padding:11px 28px;border-radius:999px;transition:.2s;}
.buy-again a:hover{background:var(--bg);text-decoration:none;}

/* ALL PRODUCTS LINK */
.all-link{text-align:center;margin-top:32px;font-size:14px;}

@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.inst-wrap{animation:rise .5s ease both;}
</style>
</head>

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.body.classList.toggle('rtl', RTL.includes(lang));
  document.documentElement.lang = lang;
  const lbl = LABELS[lang] || LABELS.en;
  document.querySelector('.topbar-back').textContent = lbl.back_site;
  document.querySelector('.lang-bar-label').textContent = lbl.lang_label;
  document.title = lbl.title + ' — Dropless';
  render();
}

function getParam() {
  return new URLSearchParams(window.location.search).get('product');
}

function render() {
  const pid = getParam();
  const L = currentLang;
  const lbl = LABELS[L] || LABELS.en;
  const el = document.getElementById('mainContent');

  if (pid) {
    const p = PRODUCTS.find(x => x.id === pid);
    if (p) { renderProduct(p, lbl, el); return; }
  }
  renderSelector(lbl, el);
}

function renderSelector(lbl, el) {
  const tiles = PRODUCTS.map(p => `
    <a class="prod-tile" href="?product=${p.id}" style="text-decoration:none;color:inherit;">
      <span class="pt-icon">${p.icon}</span>
      <span class="pt-name">${p.name}</span>
    </a>`).join('');
  el.innerHTML = `
    <div class="sel-wrap">
      <div class="eyebrow" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;">Dropless</div>
      <h1>${lbl.title}</h1>
      <p>${lbl.select}</p>
      <div class="prod-grid">${tiles}</div>
    </div>`;
}

function renderProduct(p, lbl, el) {
  const L = currentLang;
  const inst = p.inst[L] || p.inst.en;
  const steps = inst.steps.map((s,i) => `<li>${s}</li>`).join('');
  el.innerHTML = `
    <div class="inst-wrap">
      <a href="how-to-use.html" class="back-link" style="display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--muted);margin-bottom:20px;text-decoration:none;">${lbl.back}</a>
      <div class="prod-header">
        <div class="prod-header-icon">${p.icon}</div>
        <div class="prod-header-text">
          <div class="prod-header-name">${p.name}</div>
          <div class="prod-header-surfaces">${lbl.surfaces}: ${p.surfaces[L] || p.surfaces.en}</div>
          <div class="prod-header-sub">dropless.com.au</div>
        </div>
      </div>

      <div class="card">
        <div class="card-head" style="background:rgba(78,168,176,.06);color:var(--teal);">
          <span class="ch-ico">💡</span>${lbl.effect}
        </div>
        <div class="card-body"><div class="eff-box">${inst.eff}</div></div>
      </div>

      <div class="card">
        <div class="card-head" style="background:rgba(13,32,39,.03);color:var(--ink);">
          <span class="ch-ico">📋</span>${lbl.steps}
        </div>
        <div class="card-body" style="padding-top:8px;">
          <ol class="steps-list">${steps}</ol>
        </div>
      </div>

      <div class="tips-box">
        <span class="tips-ico">⚡</span>
        <div><strong>${lbl.tips}:</strong> ${lbl.tip_text}</div>
      </div>

      <div class="buy-again">
        <h3>${lbl.buy}</h3>
        <p>${lbl.buy_sub}</p>
        <a href="/#buy">${lbl.buy_btn}</a>
      </div>

      <div class="all-link">
        <a href="how-to-use.html" style="color:var(--muted);">${lbl.back}</a>
      </div>
    </div>`;
}

render();
